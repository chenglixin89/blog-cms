server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: blog-backend
  datasource:
    url: ${BLOG_DB_URL:jdbc:mysql://localhost:3306/blog_cms?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${BLOG_DB_USERNAME:root}
    password: ${BLOG_DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # Schema is now managed by Flyway. The legacy schema.sql / spring.sql.init.* path
  # is intentionally disabled so the two cannot fight over DDL.
  sql:
    init:
      mode: never
  flyway:
    enabled: ${BLOG_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    # baseline-on-migrate lets Flyway adopt an existing legacy database (created by
    # the old schema.sql + DatabaseMigrationRunner combo) without having to drop it.
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

blog:
  upload:
    dir: uploads
  auth:
    admin:
      username: admin
      # Raw (un-hashed) password used only when seeding a brand-new database.
      # DataSeeder strips a legacy "{noop}" prefix and BCrypt-hashes the result.
      password: 123456
      nickname: Admin
  jwt:
    secret: "this-is-a-demo-secret-key-change-it-at-least-32-chars"
    expire-seconds: 7200
