server:
  port: 8080

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog_cms?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  configuration:
    map-underscore-to-camel-case: true

blog:
  upload:
    dir: uploads
  auth:
    admin:
      username: admin
      password: "{noop}123456"
      nickname: Admin
  jwt:
    secret: "this-is-a-demo-secret-key-change-it-at-least-32-chars"
    expire-seconds: 7200


# OpenAPI / Swagger UI (springdoc). Documentation is generated automatically
# from the controllers; the paths below stay outside /api/admin so they are
# unaffected by the admin JWT interceptor (i.e. they remain public). If you
# want to lock them down, simply move the prefix under /api/admin or add an
# explicit path pattern to the interceptor exclusion list.
springdoc:
  api-docs:
    enabled: ${BLOG_OPENAPI_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${BLOG_OPENAPI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
